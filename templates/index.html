<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sequenciamento de Produção</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>
<div class="nav">
    <a href="/explosao_fusos">Explosão de Fusos</a>
</div>
<div class="filtros">
    <select id="filtroOperador">
        <option value="">Operador (todos)</option>
    </select>

    <input id="filtroProduto" placeholder="Produto">

    <select id="filtroStatus">
        <option value="">Status (todos)</option>
        <option value="aberto">Em aberto</option>
        <option value="finalizada">Finalizada</option>
    </select>

    <select id="filtroProducao">
        <option value="">Produção (todas)</option>
        <option value="sim">Com produção</option>
        <option value="nao">Sem produção</option>
    </select>
</div>

<div class="container">
    <h2>Pesquisa de OP / Produto</h2>

    <input id="busca" placeholder="OP (5) ou Produto (6/7)">
    <div class="actions">
        <button onclick="buscarComFiltros">Pesquisar</button>
        <button onclick="listarAbertas()">Ordens em aberto</button>
    </div>

    <div id="resultado"></div>
</div>

<!-- MODAL -->
<div id="modalSequenciar" class="modal">
    <div class="modal-content">
        <h3>Sequenciar OP <span id="opAtual"></span></h3>

        <h4>Linha</h4>
        <div class="radio-list">
            <label class="radio-row">
                <span>Deslizante</span>
                <input type="radio" name="linha" value="Deslizante"
                       onchange="carregarOperadores(this.value)">
            </label>

            <label class="radio-row">
                <span>Basculante</span>
                <input type="radio" name="linha" value="Basculante"
                       onchange="carregarOperadores(this.value)">
            </label>

            <label class="radio-row">
                <span>New BV</span>
                <input type="radio" name="linha" value="New BV"
                       onchange="carregarOperadores(this.value)">
            </label>
        </div>

        <h4>Operador</h4>
        <div id="listaOperadores" class="radio-list"></div>

        <div class="modal-actions">
            <button onclick="fecharSequenciamento()">Cancelar</button>
            <button class="primary" onclick="confirmarSequenciamento()">Confirmar</button>
        </div>
    </div>
</div>

<script>
let opSelecionada = null;

async function pesquisar() {
    const q = busca.value.trim();
    resultado.innerHTML = '';
    if (!q) return;

    const res = await fetch(`/pesquisar?q=${q}`);
    const data = await res.json();

    if (data.tipo === 'erro') {
        resultado.innerHTML = `<p class="erro">${data.mensagem}</p>`;
        return;
    }

    (data.tipo === 'op' ? [data.dados] : data.dados).forEach(renderOp);
}

async function listarAbertas() {
    resultado.innerHTML = '';
    const res = await fetch('/ops_abertas');
    (await res.json()).forEach(renderOp);
}

function renderOp(op) {
    let statusClass =
        op.status === 'Finalizada' ? 'finalizada' :
        op.status === 'Inválida' ? 'erro' :
        'aberto';

    let botao = '';
    if (op.quantidade_produzida === 0) {
        botao = `
            <button class="primary"
                    onclick="abrirSequenciamento('${op.op}')">
                Sequenciar
            </button>
        `;
    }

    resultado.innerHTML += `
        <div class="op">
            <div class="op-info">
                <p><b>OP:</b> ${op.op}</p>
                <p><b>Cód. Produto:</b> ${op.produto}</p>
                <p><b>Descrição:</b> ${op.descricao}</p>
                <p><b>Qtd OP:</b> ${op.quantidade_total}</p>
                <p><b>Qtd Produzida:</b> ${op.quantidade_produzida}</p>
                <p><b>Status:</b>
                    <span class="${statusClass}">
                        ${op.status}
                    </span>
                </p>
                <p><b>Operador:</b> ${op.operador || '—'}</p>
            </div>
            <div class="op-actions">${botao}</div>
        </div>
    `;
}

function abrirSequenciamento(op) {
    opSelecionada = op;
    opAtual.innerText = op;
    listaOperadores.innerHTML = '';
    modalSequenciar.style.display = 'flex';
}

function fecharSequenciamento() {
    modalSequenciar.style.display = 'none';
}

async function carregarOperadores(linha) {
    const res = await fetch(`/operadores/${linha}`);
    const operadores = await res.json();

    const div = document.getElementById('listaOperadores');
    div.innerHTML = '';

    if (operadores.length === 0) {
        div.innerHTML = '<p class="erro">Nenhum operador para esta linha</p>';
        return;
    }

    operadores.forEach(op => {
        div.innerHTML += `
            <label class="radio-row">
                <span>${op}</span>
                <input type="radio" name="operador" value="${op}">
            </label>
        `;
    });
}

async function confirmarSequenciamento() {
    const linha = document.querySelector('input[name="linha"]:checked');
    const operador = document.querySelector('input[name="operador"]:checked');

    if (!linha || !operador) {
        alert('Selecione linha e operador');
        return;
    }

    await fetch('/sequenciar', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            op: opSelecionada,
            linha: linha.value,
            operador: operador.value
        })
    });

    fecharSequenciamento();
    pesquisar();
}

async function buscarComFiltros() {
    resultado.innerHTML = '';

    const params = new URLSearchParams({
        operador: filtroOperador.value,
        produto: filtroProduto.value,
        status: filtroStatus.value,
        producao: filtroProducao.value
    });

    const res = await fetch(`/ops?${params.toString()}`);
    const dados = await res.json();

    if (dados.length === 0) {
        resultado.innerHTML = '<p class="erro">Nenhuma OP encontrada</p>';
        return;
    }

    dados.forEach(renderOp);
}

async function carregarOperadoresFiltro() {
    const res = await fetch('/operadores_lista');
    const operadores = await res.json();

    operadores.forEach(op => {
        filtroOperador.innerHTML += `<option value="${op}">${op}</option>`;
    });
}

carregarOperadoresFiltro();

</script>

</body>
</html>
